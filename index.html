<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
  <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <article data-testid="test-todo-card">
      <label class="title-row">
        <input
           type="checkbox" 
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete" />
        <span>
     <h3 data-testid="test-todo-title">
       Finish HNG Todo Task
        </h3>
        </span>
        </label>
      <p id="todo-description" data-testid="test-todo-collapsible-section"> Complete the HNG frontend task by building a functional and accessible Todo card.
      </p>
      <botton type="button"
        data-testid="test-todo-expand-toggle"
        aria-expanded="false"
        aria-controls="todo-description">Expand</botton>
      <div class="meta">
      <strong data-testid="test-todo-priority" aria-label="Priority: High"> High
        </strong>
      <ul data-testid="test-todo-tags">
        <li data-testid="test-todo-tag-urgent">Urgent</li>
        <li data-testid="test-todo-tag-work">Work</li>
      </ul>
      <p data-testid="test-todo-due-date"> Due:
        <time datetime="2026-04-15">April 15, 2026</time>
      </p>
      <p data-testid="test-todo-time-remaining" aria-live="polite"> Due in 3 days
      </p>
        <span data-testid="test-todo-overdue-indicator"></span>
      <span data-testid="test-todo-status" aria-label="Status: Pending">Pending
      </span>
        <select data-testid="test-todo-status-control" aria-label="Task status">
          <option value="Pending">Pending</option>
          <option value="in progress">In progress</option>
          <option  value="Done">Done</option>
        </select>
      </div>
      <div class="btn-container">
        <button data-testid="test-todo-edit-button" aria-label="Edit task">Edit 
        </button>
        <button data-testid="test-todo-delete-button" aria-label="Delete task">Delete
          </button>
      </div>
      <form data-testid="test-todo-edit-form" class="edit-form" hidden>
        <label for="edit-title">Title</label>
        <input id="edit-title" data-testid="test-todo-edit-title-input" type="text" />
        <label for="edit-description">Description</label>
        <textarea id="edit-description" data-testid="test-todo-edit-description-input"></textarea>
        <label for="edit-priority">Priority</label>
        <select id="edit-priority" data-testid="test-todo-edit-priority-select">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>
        <label for="edit-due-date">Due Date</label>
        <input id="edit-due-date" type="date" data-testid="test-todo-edit-due-date-input" />
        <button type="button" data-testid="test-todo-save-button">Save</button>
        <button type="button" data-testid="test-todo-cancel-button">Cancel</button>
      </form>
    </article>
    <script src="index.js"></script>
  </body>
</html>
